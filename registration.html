<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            /* Allow the page to scroll naturally */
            min-height: 100%;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container to manage the flow */
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        iframe {
            width: 100%;
            /* Set a minimum height so it's usable, 
               or use 100vh to fill the screen before scrolling to footer */
            min-height: 100vh;
            border: none;
            flex: 1; /* Grows to take available space */
        }

        footer {
            background-color: #ffffff;
            border-top: 1px solid #ddd;
            padding: 20px 10px;
            text-align: center;
            font-size: 14px;
            color: #555;
            /* Ensures it stays at the bottom of the content */
            margin-top: auto;
        }

        footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="wrapper">
        <iframe 
            id="appFrame"
            src="https://script.google.com/macros/s/AKfycbzq4BU9aK5reXT8mC2c6m2Ek1vYmdUEIU6-UAJr8Wq6YG2E6xw63A0uOk5cWuFqIYTA6Q/exec?page=registration" 
            allow="camera; geolocation; microphone; clipboard-read; clipboard-write"
            onload="document.getElementById('loader').style.display='none';">
        </iframe>

        <footer>
            @2026 | Developed and maintained by 
            <a href="...." target="_blank">LUNISOLAR MANSION</a>
        </footer>
    </div>

</body>
</html>
